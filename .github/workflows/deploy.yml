name: Deploy to Hostinger

on:
  push:
    branches: [main]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci
      - run: npm run build

      - name: Deploy to Hostinger via SFTP (lftp)
        run: |
          sudo apt-get update && sudo apt-get install -y lftp
          lftp -u "${{ secrets.FTP_USER }},${{ secrets.FTP_PASS }}" \
            -e "set sftp:connect-program 'ssh -o StrictHostKeyChecking=no -p 65002'; \
                mirror --reverse --delete --verbose ./build/ /public_html/; \
                quit" \
            sftp://217.196.54.108
